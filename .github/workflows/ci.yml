name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm -r run test:coverage

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v5
        with:
          files: packages/core/coverage/coverage-final.json
          flags: core
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  bench:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run vitest bench
        run: pnpm bench

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-bench-results
          path: benchmarks/vitest-bench-results.json
          if-no-files-found: ignore

  accuracy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install ngspice
        run: sudo apt-get update && sudo apt-get install -y ngspice

      - name: Build @spice-ts/core
        run: pnpm build

      - name: Run accuracy check
        run: npx tsx benchmarks/accuracy.ts --ci

      - name: Upload accuracy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-results
          path: benchmarks/accuracy-results.json
          if-no-files-found: ignore
