name: Preview Showcase

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: github.event.action != 'closed'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - if: github.event.action != 'closed'
        run: pnpm install

      - if: github.event.action != 'closed'
        run: pnpm --filter @spice-ts/core build

      - if: github.event.action != 'closed'
        run: pnpm --filter @spice-ts/ui build

      - if: github.event.action != 'closed'
        run: cd examples/showcase && pnpm build
        env:
          VITE_BASE_PATH: /spice-ts/pr-preview/pr-${{ github.event.number }}/

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: examples/showcase/dist
