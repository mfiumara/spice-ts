name: Deploy Showcase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm --filter @spice-ts/core build
      - run: pnpm --filter @spice-ts/ui build
      - run: cd examples/showcase && pnpm build

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: examples/showcase/dist
          clean-exclude: pr-preview
